<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Member - Smart Gym</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Oswald', sans-serif;
            background: url('/static/images/gym-bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0,0,0,0.85);
            min-height: 100vh;
            padding: 30px;
        }

        .navbar {
            background: black;
            border-radius: 10px;
        }

        .form-box {
            background: rgba(26, 26, 26, 0.95);
            padding: 35px;
            max-width: 450px;
            margin: 50px auto;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
            color: white;
        }

        .form-title {
            text-align: center;
            color: #00ff88;
            margin-bottom: 25px;
        }

        .form-control, .form-select {
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
        }

        .form-control:focus, .form-select:focus {
            border-color: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            background: #111;
            color: white;
        }

        .btn-submit {
            background: #00ff88;
            color: black;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #00ff88;
            text-decoration: none;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        label {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="overlay">

    <!-- 🔥 Navbar -->
    <nav class="navbar navbar-dark px-4 py-3">
        <span class="navbar-brand">🏋️ Add Member</span>
        <a href="/members" class="btn btn-success">Members</a>
    </nav>

    <!-- 🔥 Form -->
    <div class="form-box">

        <h3 class="form-title">💪 Add New Member</h3>

        <form method="POST">

            <label><i class="fas fa-user"></i> Name</label>
            <input type="text" name="name" class="form-control" required>

            <label><i class="fas fa-phone"></i> Phone</label>
            <input type="text" name="phone" class="form-control" required>

            <label><i class="fas fa-id-card"></i> Membership Plan</label>
            <select name="plan_id" class="form-select" required>
                <option value="">Select Plan</option>
                {% for plan in plans %}
                    <option value="{{ plan.id }}">
                        {{ plan.plan_name }} ({{ plan.duration_days }} Days)
                    </option>
                {% endfor %}
            </select>

            <button type="submit" class="btn btn-submit w-100 mt-4">
                <i class="fas fa-plus"></i> Add Member
            </button>

        </form>

        <a href="/members" class="back-link">← Back to Members</a>

    </div>

</div>

</body>
</html>
