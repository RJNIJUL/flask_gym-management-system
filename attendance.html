<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Attendance - Smart Gym</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Oswald', sans-serif;
            background: url('/static/images/gym-bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0,0,0,0.85);
            min-height: 100vh;
            padding: 30px;
            color: white;
        }

        .navbar {
            background: black;
            border-radius: 10px;
        }

        .title {
            color: #00ff88;
        }

        .glass-box {
            background: rgba(26, 26, 26, 0.9);
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 0 25px rgba(0,255,136,0.2);
        }

        .form-select, .btn-checkin {
            border-radius: 10px;
        }

        .btn-checkin {
            background: #00ff88;
            color: black;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-checkin:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .table {
            margin-top: 20px;
        }

        .table thead {
            background: #00ff88;
            color: black;
        }

        .table tbody tr:hover {
            background: #222;
        }

        .message {
            background: #00ff88;
            color: black;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="overlay">

    <!-- 🔥 Navbar -->
    <nav class="navbar navbar-dark px-4 py-3 mb-4">
        <span class="navbar-brand">🏋️ Attendance Panel</span>
        <a href="/dashboard" class="btn btn-success">Dashboard</a>
    </nav>

    <div class="container">

        <h2 class="title mb-4 text-center">Today's Attendance</h2>

        <!-- Message -->
        {% if message %}
            <div class="message mb-3 text-center">
                {{ message }}
            </div>
        {% endif %}

        <!-- 🔥 Check-in Box -->
        <div class="glass-box mb-4">

            <form method="POST" class="row g-3 align-items-center">

                <div class="col-md-8">
                    <select name="member_id" class="form-select" required>
                        <option value="">Select Member</option>
                        {% for m in members %}
                            <option value="{{ m.id }}">{{ m.name }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-4">
                    <button type="submit" class="btn btn-checkin w-100">
                        <i class="fas fa-check"></i> Check In
                    </button>
                </div>

            </form>

        </div>

        <!-- 🔥 Attendance Table -->
        <div class="glass-box">

            <h5><i class="fas fa-list"></i> Attendance Records</h5>

            <table class="table table-dark table-hover text-center">
                <thead>
                    <tr>
                        <th>Member Name</th>
                        <th>Check In Time</th>
                    </tr>
                </thead>

                <tbody>
                    {% for row in attendance %}
                    <tr>
                        <td>{{ row.name }}</td>
                        <td>{{ row.check_in }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>

    </div>

</div>

</body>
</html>
