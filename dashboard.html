<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Smart Gym</title>

    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Oswald', sans-serif;
            background: #0f0f0f;
            color: white;
        }

        .container {
            padding: 30px;
        }

        h1 {
            color: #00ff88;
            letter-spacing: 2px;
        }

        .cards {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .card {
            flex: 1;
            min-width: 220px;
            background: #1a1a1a;
            padding: 25px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,255,136,0.2);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 30px rgba(0,255,136,0.4);
        }

        .card h2 {
            font-size: 18px;
        }

        .card h1 {
            font-size: 40px;
            margin-top: 10px;
        }

        .btn {
            padding: 10px 20px;
            background: #00ff88;
            color: black;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            margin-right: 10px;
        }

        .chart-box {
            margin-top: 40px;
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,255,136,0.2);
        }
    </style>
</head>

<body>

<div class="container">

    <h1>💪 SMART GYM DASHBOARD</h1>

    <div class="cards">
        <div class="card">
            <h2>Total Members</h2>
            <h1>{{ total_members }}</h1>
        </div>

        <div class="card">
            <h2>Expired Members</h2>
            <h1>{{ expired_members }}</h1>
        </div>

        <div class="card">
            <h2>Expiring Soon</h2>
            <h1>{{ expiring_soon|length }}</h1>
        </div>
    </div>

    <br><br>

    <a href="/members" class="btn">Manage Members</a>
    <a href="/attendance" class="btn">Attendance</a>
    <a href="/logout" class="btn">Logout</a>

    <div class="chart-box">
        <h2>Monthly Revenue</h2>
        <canvas id="revenueChart"></canvas>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const months = {{ months|safe }};
    const amounts = {{ amounts|safe }};

    new Chart(document.getElementById('revenueChart'), {
        type: 'bar',
        data: {
            labels: months,
            datasets: [{
                label: 'Revenue',
                data: amounts,
                backgroundColor: '#182e86'
            }]
        }
    });
</script>

</body>
</html>
