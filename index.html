<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Smart Gym</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h1 class="text-center mb-4">🏋️ Smart Gym Management System</h1>

    <div class="row g-4">

        <div class="col-md-4">
            <a href="/add_member" class="text-decoration-none">
                <div class="card text-center p-4 shadow">
                    <h4>Add Member</h4>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/members" class="text-decoration-none">
                <div class="card text-center p-4 shadow">
                    <h4>View Members</h4>
                </div>
            </a>
        </div>

        <div class="col-md-4">
            <a href="/logout" class="text-decoration-none">
                <div class="card text-center p-4 shadow">
                    <h4>Logout</h4>
                </div>
            </a>
        </div>

    </div>

</div>

</body>
</html>
