<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Gym Login</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Oswald', sans-serif;
            background: url('/static/images/gym-bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0, 0, 0, 0.85);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background: rgba(26, 26, 26, 0.95);
            padding: 40px;
            border-radius: 20px;
            width: 380px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0,255,136,0.3);
            backdrop-filter: blur(10px);
        }

        .logo {
            color: #00ff88;
            font-size: 32px;
            letter-spacing: 3px;
            margin-bottom: 10px;
            animation: glow 2s infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 10px #00ff88; }
            to { text-shadow: 0 0 30px #00ff88, 0 0 50px #00ff88; }
        }

        .subtitle {
            color: #ccc;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group-text {
            background: #111;
            border: 1px solid #333;
            color: #00ff88;
        }

        .form-control {
            background: #111;
            border: 1px solid #333;
            color: white;
        }

        .form-control:focus {
            border-color: #00ff88;
            box-shadow: 0 0 10px #00ff88;
            background: #111;
            color: white;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #00ff88;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .error {
            background: #ff4d4d;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 10px;
            color: white;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="overlay">

    <div class="login-card">

        <div class="logo">💪 SMART GYM</div>
        <div class="subtitle">Push Yourself Beyond Limits</div>

        <!-- 🔥 Error Message -->
        {% if error %}
            <div class="error">
                {{ error }}
            </div>
        {% endif %}

        <form method="POST" action="/login">

            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-user"></i></span>
                <input type="text" name="username" class="form-control" placeholder="Username" required>
            </div>

            <div class="input-group">
                <span class="input-group-text"><i class="fas fa-lock"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>

            <button type="submit" class="btn btn-login mt-3">
                <i class="fas fa-sign-in-alt"></i> LOGIN
            </button>

        </form>

    </div>

</div>

</body>
</html>
