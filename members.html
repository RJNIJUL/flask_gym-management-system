<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Members - Smart Gym</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Oswald', sans-serif;
            background: url('/static/images/gym-bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0,0,0,0.85);
            min-height: 100vh;
            padding: 30px;
            color: white;
        }

        .navbar {
            background: black;
            border-radius: 10px;
        }

        .title {
            color: #00ff88;
        }

        .glass-box {
            background: rgba(26,26,26,0.9);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0,255,136,0.2);
        }

        .table thead {
            background: #00ff88;
            color: black;
        }

        .table tbody tr:hover {
            background: #222;
        }

        .badge-active {
            background: #00ff88;
            color: black;
            padding: 5px 10px;
            border-radius: 10px;
        }

        .badge-expired {
            background: red;
            padding: 5px 10px;
            border-radius: 10px;
        }

        .btn-sm {
            border-radius: 8px;
            margin: 2px;
        }

        .search-box input {
            border-radius: 10px;
        }
    </style>
</head>

<body>

<div class="overlay">

    <!-- 🔥 Navbar -->
    <nav class="navbar navbar-dark px-4 py-3 mb-4">
        <span class="navbar-brand">💪 Members</span>
        <a href="/dashboard" class="btn btn-success">Dashboard</a>
    </nav>

    <div class="container">

        <h2 class="title mb-3">Members List</h2>

        <!-- 🔍 Search -->
        <div class="row mb-3 search-box">
            <div class="col-md-6">
                <input type="text" id="searchInput" class="form-control" placeholder="Search by name...">
            </div>
            <div class="col-md-6 text-end">
                <a href="/add_member" class="btn btn-success">
                    <i class="fas fa-user-plus"></i> Add Member
                </a>
            </div>
        </div>

        <!-- 🔥 Table -->
        <div class="glass-box">

            <table class="table table-dark table-hover text-center" id="membersTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Phone</th>
                        <th>Plan</th>
                        <th>Start</th>
                        <th>End</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody>
                    {% for m in members %}
                    <tr>
                        <td>{{ m.name }}</td>
                        <td>{{ m.phone }}</td>
                        <td>{{ m.plan_name }}</td>
                        <td>{{ m.start_date }}</td>
                        <td>{{ m.end_date }}</td>

                        <td>
                            {% if m.status == "Active" %}
                                <span class="badge-active">Active</span>
                            {% else %}
                                <span class="badge-expired">Expired</span>
                            {% endif %}
                        </td>

                        <td>
                            <a href="/member/{{ m.id }}" class="btn btn-primary btn-sm">
                                <i class="fas fa-eye"></i>
                            </a>

                            <a href="/renew/{{ m.id }}" class="btn btn-warning btn-sm">
                                <i class="fas fa-sync"></i>
                            </a>

                            <a href="/delete_member/{{ m.id }}" class="btn btn-danger btn-sm">
                                <i class="fas fa-trash"></i>
                            </a>

                            <form action="/attendance" method="POST" style="display:inline;">
                                <input type="hidden" name="member_id" value="{{ m.id }}">
                                <button type="submit" class="btn btn-success btn-sm">
                                    <i class="fas fa-check"></i>
                                </button>
                            </form>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>

    </div>

</div>

<!-- 🔥 Search Script -->
<script>
    const input = document.getElementById("searchInput");
    const table = document.getElementById("membersTable");

    input.addEventListener("keyup", function () {
        let filter = input.value.toLowerCase();
        let rows = table.getElementsByTagName("tr");

        for (let i = 1; i < rows.length; i++) {
            let name = rows[i].getElementsByTagName("td")[0];
            if (name) {
                let text = name.textContent || name.innerText;
                rows[i].style.display = text.toLowerCase().includes(filter) ? "" : "none";
            }
        }
    });
</script>

</body>
</html>
