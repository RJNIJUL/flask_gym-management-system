<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Renew Membership</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            margin: 0;
            font-family: 'Oswald', sans-serif;
            background: url('/static/images/gym-bg.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        .overlay {
            background: rgba(0,0,0,0.85);
            min-height: 100vh;
            padding: 30px;
        }

        .navbar {
            background: black;
            border-radius: 10px;
        }

        .renew-box {
            background: rgba(26, 26, 26, 0.95);
            padding: 35px;
            max-width: 500px;
            margin: 50px auto;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0,255,136,0.3);
            color: white;
        }

        .title {
            text-align: center;
            color: #00ff88;
            margin-bottom: 20px;
        }

        .info-box {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .label {
            color: #00ff88;
            font-weight: bold;
        }

        .form-select {
            background: #111;
            border: 1px solid #333;
            color: white;
            border-radius: 10px;
        }

        .form-select:focus {
            border-color: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .btn-submit {
            background: #00ff88;
            color: black;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }

        .btn-submit:hover {
            background: #00cc6a;
            transform: scale(1.05);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 15px;
            color: #00ff88;
            text-decoration: none;
        }

        .price-box {
            margin-top: 15px;
            padding: 10px;
            background: #1a1a1a;
            border-radius: 10px;
            text-align: center;
            color: #00ff88;
        }
    </style>
</head>

<body>

<div class="overlay">

    <!-- 🔥 Navbar -->
    <nav class="navbar navbar-dark px-4 py-3">
        <span class="navbar-brand">🔁 Renew Membership</span>
        <a href="/members" class="btn btn-success">Members</a>
    </nav>

    <div class="renew-box">

        <h3 class="title">Renew Membership</h3>

        <!-- 🔥 Member Info -->
        <div class="info-box">
            <p><span class="label">👤 Member:</span> {{ member.name }}</p>
            <p><span class="label">📋 Current Plan:</span> {{ member.plan_name }}</p>
            <p><span class="label">📅 Expiry:</span> {{ member.end_date }}</p>
        </div>

        <!-- 🔥 Form -->
        <form method="POST">

            <label><i class="fas fa-id-card"></i> Select Plan</label>
            <select name="plan_id" id="planSelect" class="form-select" required>
                <option value="">Select Plan</option>
                {% for plan in plans %}
                    <option value="{{ plan.id }}" data-price="{{ plan.price }}">
                        {{ plan.plan_name }} ({{ plan.duration_days }} Days)
                    </option>
                {% endfor %}
            </select>

            <!-- 💰 Price Preview -->
            <div class="price-box" id="priceBox">
                Select a plan to see price
            </div>

            <label class="mt-3"><i class="fas fa-credit-card"></i> Payment Method</label>
            <select name="method" class="form-select" required>
                <option value="">Select Method</option>
                <option value="Cash">Cash</option>
                <option value="UPI">UPI</option>
                <option value="Card">Card</option>
            </select>

            <button type="submit" class="btn btn-submit w-100 mt-4">
                <i class="fas fa-sync"></i> Renew Now
            </button>

        </form>

        <a href="/members" class="back-link">← Back to Members</a>

    </div>

</div>

<!-- 🔥 Price Script -->
<script>
    const planSelect = document.getElementById("planSelect");
    const priceBox = document.getElementById("priceBox");

    planSelect.addEventListener("change", function () {
        const selected = planSelect.options[planSelect.selectedIndex];
        const price = selected.getAttribute("data-price");

        if (price) {
            priceBox.innerText = "💰 Price: ₹" + price;
        } else {
            priceBox.innerText = "Select a plan to see price";
        }
    });
</script>

</body>
</html>
